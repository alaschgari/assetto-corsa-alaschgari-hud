[SETTINGS]
skin = default ; HUD Skin (Select the active theme for the HUD); "default" or "cyberpunk"
scale = 100 ; App scale (Scale in which the app window and elements will be rendered); from 50% to 150%
show_rpm = True ; Show Shift Bar (If unchecked, the top segmented RPM shift bar will be hidden); "True" or "False"
show_chassis = True ; Show Chassis Diagram (If unchecked, the car wireframe graphic will be hidden); "True" or "False"
show_tire_bars = True ; Show Tire Temp Bars (If unchecked, the mini progress bars under the tires will be hidden); "True" or "False"
