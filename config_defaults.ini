[WIDGETS_SCALE]
scale_damage = 100 ; Damage Scale (Size scale for the vehicle damage widget); from 50% to 400%
scale_debug = 100 ; Info & Logs Scale (Size scale for the info and error logs widget); from 50% to 400%
scale_fuel = 100 ; Fuel Calc Scale (Size scale for the fuel calculator widget); from 50% to 400%
scale_gear = 100 ; Gear Box Scale (Size scale for the gear and G-force widget); from 50% to 400%
scale_kers = 100 ; KERS & Wear Scale (Size scale for the KERS and tire wear widget); from 50% to 400%
scale_pedals = 100 ; Pedals Input Scale (Size scale for the pedals widget); from 50% to 400%
scale_perf = 100 ; Performance Scale (Size scale for the delta and turbo widget); from 50% to 400%
scale_shift = 100 ; Shift Lights Scale (Size scale for the RPM shift light bar); from 50% to 400%
scale_speed = 100 ; Speedometer Scale (Size scale for the speedometer widget); from 50% to 400%
scale_times = 100 ; Laps & Times Scale (Size scale for the lap timing widget); from 50% to 400%
scale_track = 100 ; Track Wind Scale (Size scale for the grip and wind widget); from 50% to 400%
scale_tires = 100 ; Tires Status Scale (Size scale for the tire and brake status widget); from 50% to 400%

[WIDGETS_VISIBILITY]
show_chassis = True ; Show Chassis Diagram (Toggle display of the wireframe chassis); "True" or "False"
show_rpm = True ; Show Shift Bar (Toggle display of the RPM shift bar); "True" or "False"
show_tire_bars = True ; Show Tire Temp Bars (Toggle display of progress bars under tires); "True" or "False"
show_pedal_graph = True ; Show Pedal Telemetry Graph (Toggle display of real-time graph next to pedal bars); "True" or "False"

[HUD_STYLE]
bg_color_idx = 0 ; HUD Background Color (Window background theme. 0: Dark, 1: Transparent, 2: Gray); from 0 to 2
opacity_pct = 65 ; HUD Opacity % (Transparency percentage of window backgrounds); from 0% to 100%
text_color_idx = 0 ; Text Neon Theme (Font color theme. 0: Cyan, 1: Magenta, 2: Lime, 3: Orange, 4: White); from 0 to 4
