<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlaschgariHUD - Sidekick Replica Web Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;700;900&display=swap');

        :root {
            --bg-color: #0c0d12;
            --hud-bg: #15171e;
            --panel-bg: #222530;
            --text-color: #a0a5b5;
            --text-bright: #ffffff;
            --cyan: #00f0ff;
            --green: #00ff66;
            --yellow: #ffff00;
            --red: #ff3333;
            --clutch: #0088ff;
            --brake: #ff3333;
            --throttle: #00ff66;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--text-bright);
            margin-bottom: 5px;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .subtitle {
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: #666;
        }

        /* HUD Main Canvas matching the exact dimensions: 800px x 130px (slightly adjusted for spacious replica) */
        .hud-container {
            width: 800px;
            height: 140px;
            background-color: var(--hud-bg);
            border-radius: 6px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            user-select: none;
            padding: 18px 10px 10px 10px;
            box-sizing: border-box;
        }

        /* Shift Lights at the top center */
        .rpm-bar-container {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 12px;
            background-color: #0b0c10;
            border-radius: 4px;
            display: flex;
            gap: 2px;
            padding: 1px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rpm-segment {
            flex: 1;
            height: 100%;
            background-color: #222;
        }

        .rpm-segment.green { background-color: var(--green); box-shadow: 0 0 5px var(--green); }
        .rpm-segment.yellow { background-color: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
        .rpm-segment.red { background-color: var(--red); box-shadow: 0 0 5px var(--red); }

        .rpm-bar-container.flash .rpm-segment {
            animation: shift-flash 0.1s infinite alternate;
        }

        @keyframes shift-flash {
            0% { background-color: var(--red); box-shadow: 0 0 8px var(--red); }
            100% { background-color: #000; }
        }

        /* HUD Panels */
        .hud-panel {
            height: 100%;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            position: relative;
        }

        /* Left Panel: Tire & Brake Status (Width: 320px) */
        .panel-left {
            width: 330px;
            padding: 5px;
            align-items: center;
            justify-content: space-between;
        }

        .chassis-outline {
            width: 60px;
            height: 90px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            position: absolute;
            left: 110px;
            top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chassis-axle-front {
            position: absolute;
            top: 20px;
            left: -15px;
            width: 86px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .chassis-axle-rear {
            position: absolute;
            bottom: 20px;
            left: -15px;
            width: 86px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* Tires & Bars positioning */
        .tire-group {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 96px;
            position: absolute;
            z-index: 5;
        }

        .tire-group.left-tires {
            left: 80px;
        }

        .tire-group.right-tires {
            left: 168px;
        }

        .tire-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tire-block {
            width: 14px;
            height: 26px;
            background-color: var(--green);
            border-radius: 2px;
            box-shadow: 0 0 5px var(--green);
        }

        .tire-bar {
            width: 20px;
            height: 4px;
            background-color: #111;
            margin-top: 3px;
            border-radius: 1px;
            overflow: hidden;
        }

        .tire-bar-fill {
            height: 100%;
            width: 80%;
            background-color: var(--green);
        }

        /* Data Labels */
        .temp-labels-left, .temp-labels-right {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 96px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
        }

        .temp-labels-left {
            align-items: flex-start;
            padding-left: 5px;
        }

        .temp-labels-right {
            align-items: flex-end;
            padding-right: 5px;
            position: absolute;
            left: 212px;
        }

        .lbl-val {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .lbl-val .temp { color: var(--text-bright); font-size: 14px; font-weight: bold; }
        .lbl-val .press { color: var(--cyan); font-size: 9px; }

        /* Brakes */
        .brake-group {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 96px;
            position: absolute;
            left: 265px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
        }

        .brake-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
        }

        .brake-item .temp { color: var(--red); font-size: 14px; font-weight: bold; }
        .brake-item .bar { width: 30px; height: 5px; background-color: var(--red); margin-top: 3px; }

        /* Center Panel: Speedometer & G-Force (Width: 260px) */
        .panel-center {
            width: 270px;
            padding: 8px;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .sub-box {
            background-color: var(--panel-bg);
            border-radius: 4px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .box-speed {
            width: 145px;
        }

        .box-gear {
            width: 95px;
        }

        .big-speed {
            font-size: 38px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .big-speed span {
            font-size: 13px;
            margin-left: 2px;
        }

        .big-gear {
            font-size: 32px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-bright);
            font-weight: 900;
            line-height: 1;
        }

        .g-force-val {
            font-size: 9px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            margin-top: 3px;
            line-height: 1;
        }

        .box-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }

        /* Right Panel: Pedals & Wear (Width: 170px) */
        .panel-right {
            width: 160px;
            padding: 8px;
            flex-direction: column;
            justify-content: space-between;
        }

        .pedal-input-row {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
            font-size: 9px;
            font-family: 'Share Tech Mono', monospace;
        }

        .pedal-label {
            width: 45px;
            color: var(--text-color);
        }

        .pedal-bar-bg {
            flex: 1;
            height: 8px;
            background-color: #111;
            border-radius: 1px;
            overflow: hidden;
            margin: 0 8px;
        }

        .pedal-bar-fill {
            height: 100%;
            width: 0%;
        }

        .pedal-bar-fill.clutch { background-color: var(--clutch); }
        .pedal-bar-fill.brake { background-color: var(--brake); }
        .pedal-bar-fill.throttle { background-color: var(--throttle); }

        .pedal-val {
            width: 25px;
            text-align: right;
            color: var(--text-bright);
        }

        .vertical-bars-container {
            display: flex;
            width: 100%;
            justify-content: space-between;
            height: 48px;
            margin-top: 5px;
        }

        .v-bar-item {
            display: flex;
            align-items: center;
            width: 48%;
            background-color: var(--panel-bg);
            border-radius: 3px;
            padding: 4px;
            box-sizing: border-box;
            justify-content: space-between;
            font-size: 9px;
        }

        .v-bar-bg {
            width: 10px;
            height: 100%;
            background-color: #111;
            border-radius: 1px;
            position: relative;
            overflow: hidden;
        }

        .v-bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--cyan);
        }

        /* Controls Panel */
        .controls {
            margin-top: 30px;
            background: #12101b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 0, 160, 0.2);
            width: 400px;
            box-sizing: border-box;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        label span {
            color: var(--cyan);
            font-weight: bold;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #1e1b29;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--cyan);
            cursor: pointer;
            box-shadow: 0 0 8px var(--cyan);
        }

        .btn-simulate {
            width: 100%;
            background: linear-gradient(135deg, #00f0ff 0%, #00ff66 100%);
            border: none;
            padding: 10px;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>AlaschgariHUD Preview</h1>
    <div class="subtitle">Sidekick Replica HUD - Live Simulator</div>

    <!-- HUD Widget -->
    <div id="hud" class="hud-container">
        <!-- Segmented RPM Shift Lights (24 blocks) -->
        <div id="rpmBarContainer" class="rpm-bar-container">
            <div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div>
            <div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div>
            <div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div>
            <div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div>
            <div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div>
            <div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div><div class="rpm-segment"></div>
        </div>

        <!-- Left Panel: Tire & Brake Status -->
        <div class="hud-panel panel-left">
            <div class="temp-labels-left">
                <div class="lbl-val">
                    <span class="temp"><span id="valFLTemp">85</span></span>
                    <span class="press"><span id="pFL">-0.5</span></span>
                </div>
                <div class="lbl-val">
                    <span class="temp"><span id="valRLTemp">82</span></span>
                    <span class="press"><span id="pRL">-0.5</span></span>
                </div>
            </div>

            <!-- Chassis Wireframe -->
            <div class="chassis-outline">
                <div class="chassis-axle-front"></div>
                <div class="chassis-axle-rear"></div>
            </div>

            <!-- Tires & Bars -->
            <div class="tire-group left-tires">
                <div class="tire-unit">
                    <div id="tFL" class="tire-block"></div>
                    <div class="tire-bar"><div id="barFL" class="tire-bar-fill"></div></div>
                </div>
                <div class="tire-unit" style="margin-top: 16px;">
                    <div id="tRL" class="tire-block"></div>
                    <div class="tire-bar"><div id="barRL" class="tire-bar-fill"></div></div>
                </div>
            </div>

            <div class="tire-group right-tires">
                <div class="tire-unit">
                    <div id="tFR" class="tire-block"></div>
                    <div class="tire-bar"><div id="barFR" class="tire-bar-fill"></div></div>
                </div>
                <div class="tire-unit" style="margin-top: 16px;">
                    <div id="tRR" class="tire-block"></div>
                    <div class="tire-bar"><div id="barRR" class="tire-bar-fill"></div></div>
                </div>
            </div>

            <div class="temp-labels-right">
                <div class="lbl-val">
                    <span class="temp"><span id="valFRTemp">85</span></span>
                    <span class="press"><span id="pFR">-0.5</span></span>
                </div>
                <div class="lbl-val">
                    <span class="temp"><span id="valRRTemp">82</span></span>
                    <span class="press"><span id="pRR">-0.5</span></span>
                </div>
            </div>

            <!-- Brakes Column -->
            <div class="brake-group">
                <div class="brake-item">
                    <span class="temp">520</span>
                    <div class="bar"></div>
                </div>
                <div class="brake-item">
                    <span class="temp">535</span>
                    <div class="bar"></div>
                </div>
            </div>
        </div>

        <!-- Center Panel: Speedometer & Gear / G-Force -->
        <div class="hud-panel panel-center">
            <!-- Speedometer Sub Box -->
            <div class="sub-box box-speed">
                <div class="big-speed"><span id="speedVal">197</span><span>KM/H</span></div>
                <div class="box-label">Speedometer</div>
            </div>

            <!-- Gear & G-Force Sub Box -->
            <div class="sub-box box-gear">
                <div class="big-gear" id="gear">G5</div>
                <div class="g-force-val">0.08 / -1.34</div>
                <div class="box-label">G-Force / Gear</div>
            </div>
        </div>

        <!-- Right Panel: Pedal Inputs & KERS/Wear -->
        <div class="hud-panel panel-right">
            <!-- Pedals -->
            <div class="pedal-input-row">
                <span class="pedal-label">Clutch</span>
                <div class="pedal-bar-bg"><div id="pedalClutch" class="pedal-bar-fill clutch" style="width: 10%;"></div></div>
                <span class="pedal-val">10%</span>
            </div>
            <div class="pedal-input-row">
                <span class="pedal-label">Brake</span>
                <div class="pedal-bar-bg"><div id="pedalBrake" class="pedal-bar-fill brake" style="width: 100%;"></div></div>
                <span class="pedal-val">100%</span>
            </div>
            <div class="pedal-input-row">
                <span class="pedal-label">Throttle</span>
                <div class="pedal-bar-bg"><div id="pedalThrottle" class="pedal-bar-fill throttle" style="width: 80%;"></div></div>
                <span class="pedal-val">80%</span>
            </div>

            <!-- KERS & Wear -->
            <div class="vertical-bars-container">
                <div class="v-bar-item">
                    <span>KERS</span>
                    <div class="v-bar-bg"><div class="v-bar-fill" style="height: 85%;"></div></div>
                </div>
                <div class="v-bar-item">
                    <span>WEAR</span>
                    <div class="v-bar-bg"><div class="v-bar-fill" style="height: 16%; background-color: #888;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Live Telemetry Sim Controls -->
    <div class="controls">
        <div class="control-group">
            <label>Drehzahl (RPM): <span id="valRpm">6800 RPM</span></label>
            <input type="range" id="simRpm" min="0" max="8500" value="6800">
        </div>

        <div class="control-group">
            <label>Gang: <span id="valGear">6</span></label>
            <input type="range" id="simGear" min="0" max="7" value="6">
        </div>

        <div class="control-group">
            <label>Reifentemperatur: <span id="valTemp">85 °C</span></label>
            <input type="range" id="simTemp" min="40" max="120" value="85">
        </div>

        <button class="btn-simulate" id="btnAutoSim">Auto-Simulation starten</button>
    </div>

    <script>
        // DOM Elements
        const rpmBarContainer = document.getElementById('rpmBarContainer');
        const gearText = document.getElementById('gear');
        const speedValText = document.getElementById('speedVal');
        const valRpm = document.getElementById('valRpm');
        const valGear = document.getElementById('valGear');
        const valTemp = document.getElementById('valTemp');
        const btnAutoSim = document.getElementById('btnAutoSim');

        // Inputs
        const simRpm = document.getElementById('simRpm');
        const simGear = document.getElementById('simGear');
        const simTemp = document.getElementById('simTemp');

        // Tires
        const valFLTemp = document.getElementById('valFLTemp');
        const valFRTemp = document.getElementById('valFRTemp');
        const valRLTemp = document.getElementById('valRLTemp');
        const valRRTemp = document.getElementById('valRRTemp');

        const barFL = document.getElementById('barFL');
        const barFR = document.getElementById('barFR');
        const barRL = document.getElementById('barRL');
        const barRR = document.getElementById('barRR');

        const maxRpmVal = 8000;
        let simInterval = null;

        function updateHUD() {
            const rpm = parseInt(simRpm.value);
            const gearVal = parseInt(simGear.value);
            const tempVal = parseInt(simTemp.value);

            // 1. Shift lights update
            const pct = rpm / maxRpmVal;
            const segments = rpmBarContainer.querySelectorAll('.rpm-segment');
            const totalSegments = segments.length;
            const activeCount = Math.round(pct * totalSegments);

            if (pct >= 0.92) {
                rpmBarContainer.className = 'rpm-bar-container flash';
            } else {
                rpmBarContainer.className = 'rpm-bar-container';
                segments.forEach((seg, idx) => {
                    if (idx < activeCount) {
                        if (idx < totalSegments * 0.6) {
                            seg.className = 'rpm-segment green';
                        } else if (idx < totalSegments * 0.85) {
                            seg.className = 'rpm-segment yellow';
                        } else {
                            seg.className = 'rpm-segment red';
                        }
                    } else {
                        seg.className = 'rpm-segment';
                    }
                });
            }
            valRpm.innerText = rpm + ' RPM';

            // 2. Speed / Gear approximation
            let gearChar = 'N';
            if (gearVal === 0) gearChar = 'R';
            else if (gearVal > 1) gearChar = 'G' + (gearVal - 1);
            gearText.innerText = gearChar;
            valGear.innerText = gearChar;

            let calculatedSpeed = 0;
            if (gearVal > 1) {
                calculatedSpeed = Math.round((rpm / maxRpmVal) * 38 * (gearVal - 1));
            }
            speedValText.innerText = calculatedSpeed;

            // 3. Tires
            valFLTemp.innerText = tempVal;
            valFRTemp.innerText = tempVal;
            valRLTemp.innerText = tempVal - 3;
            valRRTemp.innerText = tempVal - 3;

            const barPct = Math.max(0, Math.min(100, ((tempVal - 40) / 80) * 100)) + '%';
            barFL.style.width = barPct;
            barFR.style.width = barPct;
            barRL.style.width = barPct;
            barRR.style.width = barPct;

            valTemp.innerText = tempVal + ' °C';
        }

        // Event Listeners
        simRpm.addEventListener('input', updateHUD);
        simGear.addEventListener('input', updateHUD);
        simTemp.addEventListener('input', updateHUD);

        // Simulation runner
        let simDirection = 1;
        btnAutoSim.addEventListener('click', () => {
            if (simInterval) {
                clearInterval(simInterval);
                simInterval = null;
                btnAutoSim.innerText = 'Auto-Simulation starten';
            } else {
                btnAutoSim.innerText = 'Simulation stoppen';
                simInterval = setInterval(() => {
                    let rpm = parseInt(simRpm.value);
                    rpm += 150 * simDirection;
                    if (rpm >= 8300) {
                        simDirection = -1;
                    } else if (rpm <= 3000) {
                        simDirection = 1;
                    }
                    simRpm.value = rpm;
                    updateHUD();
                }, 50);
            }
        });

        // Initialize
        updateHUD();
    </script>
</body>
</html>
