[SETTINGS]
scale_shift = 100 ; Shift Lights Scale (Scale of the segmented shift light bar app, from 50% to 400%); range=(50, 400), step=10
scale_tires = 100 ; Tires Status Scale (Scale of the tires, brake, and chassis app, from 50% to 400%); range=(50, 400), step=10
scale_speed = 100 ; Speedometer Scale (Scale of the digital speedometer app, from 50% to 400%); range=(50, 400), step=10
scale_gear = 100 ; Gear Box Scale (Scale of the gear indicator and G-force app, from 50% to 400%); range=(50, 400), step=10
scale_pedals = 100 ; Pedals Input Scale (Scale of the throttle, brake, and clutch bars app, from 50% to 400%); range=(50, 400), step=10
scale_kers = 100 ; KERS & Wear Scale (Scale of the KERS energy and tire wear bar app, from 50% to 400%); range=(50, 400), step=10
scale_times = 100 ; Laps & Times Scale (Scale of the lap timing app, from 50% to 400%); range=(50, 400), step=10
scale_fuel = 100 ; Fuel Calc Scale (Scale of the fuel calculator and consumption app, from 50% to 400%); range=(50, 400), step=10
scale_perf = 100 ; Performance Scale (Scale of the delta times and turbo boost app, from 50% to 400%); range=(50, 400), step=10
scale_damage = 100 ; Damage Scale (Scale of the aero, engine, and transmission damage app, from 50% to 400%); range=(50, 400), step=10
scale_track = 100 ; Track Wind Scale (Scale of the surface grip and wind speed app, from 50% to 400%); range=(50, 400), step=10
scale_debug = 100 ; Info & Logs Scale (Scale of the system info and error logs app, from 50% to 400%); range=(50, 400), step=10

show_rpm = True ; Show Shift Bar (Toggle the top segmented RPM shift lights bar); "True" or "False"
show_chassis = True ; Show Chassis Diagram (Toggle the car wireframe chassis overlay); "True" or "False"
show_tire_bars = True ; Show Tire Temp Bars (Toggle the mini core temperature bars under the tires); "True" or "False"

bg_color_idx = 0 ; HUD Background Color (Theme color for HUD window backgrounds. 0: Cyberpunk Dark, 1: Transparent, 2: Sleek Gray); range=(0, 2), step=1
opacity_pct = 65 ; HUD Opacity % (Transparency percentage of window backgrounds, from 0% to 100%); range=(0, 100), step=5
text_color_idx = 0 ; Text Neon Theme (Select color theme for fonts. 0: Cyan, 1: Magenta, 2: Lime, 3: Orange, 4: White); range=(0, 4), step=1
