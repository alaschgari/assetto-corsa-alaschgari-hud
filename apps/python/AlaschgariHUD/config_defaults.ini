[SETTINGS]
scale_shift = 100 ; Shift Lights Scale; range=(50, 400), step=10
scale_tires = 100 ; Tires Status Scale; range=(50, 400), step=10
scale_speed = 100 ; Speedometer Scale; range=(50, 400), step=10
scale_gear = 100 ; Gear Box Scale; range=(50, 400), step=10
scale_pedals = 100 ; Pedals Input Scale; range=(50, 400), step=10
scale_kers = 100 ; KERS and Wear Scale; range=(50, 400), step=10
scale_times = 100 ; Laps and Times Scale; range=(50, 400), step=10
scale_fuel = 100 ; Fuel Calc Scale; range=(50, 400), step=10
scale_perf = 100 ; Performance Scale; range=(50, 400), step=10
scale_damage = 100 ; Damage Scale; range=(50, 400), step=10
scale_track = 100 ; Track Wind Scale; range=(50, 400), step=10
scale_debug = 100 ; Info and Logs Scale; range=(50, 400), step=10

show_rpm = True ; Show Shift Bar; "True" or "False"
show_chassis = True ; Show Chassis Diagram; "True" or "False"
show_tire_bars = True ; Show Tire Temp Bars; "True" or "False"

bg_color_idx = 0 ; HUD Background Color; range=(0, 2), step=1
opacity_pct = 65 ; HUD Opacity %; range=(0, 100), step=5
text_color_idx = 0 ; Text Neon Theme; range=(0, 4), step=1
